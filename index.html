<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>动态比例长条</title>
<style>
  :root{
    --bg:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--card:#fff;
    --shadow:0 18px 50px rgba(15,23,42,.08);--radius:22px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif}
  .page{width:min(1180px,calc(100vw - 48px));margin:42px auto}
  .hero{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;margin-bottom:22px}
  h1{margin:0 0 8px;font-size:clamp(28px,4vw,46px);letter-spacing:-.04em;line-height:1.05}
  p{margin:0;color:var(--muted);font-size:15px}
  .toolbar,.editor-actions,.footer-actions{display:flex;flex-wrap:wrap;gap:10px}
  button{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:999px;padding:10px 16px;font-weight:700;cursor:pointer;transition:.15s ease;white-space:nowrap}
  button:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(15,23,42,.08)}
  button.primary{background:#111827;color:#fff;border-color:#111827}
  button.danger{color:#b91c1c;border-color:#fecaca;background:#fff}
  button.small{border-radius:12px;padding:8px 10px;min-width:38px}
  .stage{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:clamp(22px,4vw,42px)}
  .total-label{text-align:center;font-size:clamp(38px,7vw,72px);font-weight:850;letter-spacing:-.06em;margin:8px 0 26px}
  .bar-wrap{position:relative;border:2px solid #111827;border-radius:16px;overflow:hidden;background:#f9fafb;min-height:118px;user-select:none;touch-action:none}
  .bar{display:flex;width:100%;height:118px}
  .segment{position:relative;min-width:0;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;padding:10px;color:#111827;border-right:1px solid rgba(17,24,39,.28)}
  .segment:last-child{border-right:0}
  .seg-title{width:100%;font-size:clamp(13px,1.6vw,18px);font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .seg-pct{font-size:clamp(20px,3vw,38px);font-weight:850;letter-spacing:-.04em}
  .handle{position:absolute;right:-7px;top:0;width:14px;height:100%;z-index:5;cursor:col-resize;display:flex;align-items:center;justify-content:center}
  .handle:after{content:"";width:4px;height:68%;border-radius:999px;background:rgba(17,24,39,.75);box-shadow:0 0 0 4px rgba(255,255,255,.5)}
  .handle:hover:after,.handle.active:after{background:#000;height:82%}
  .hint{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:13px;margin:14px 2px 0}
  .editor{margin-top:24px;border-top:1px solid var(--line);padding-top:22px}
  .editor-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
  .editor-head h2{margin:0;font-size:18px}
  .section-title-input{width:min(320px,100%);border:1px solid transparent;border-radius:12px;padding:8px 10px;margin:-8px -10px;font-size:18px;font-weight:800;color:var(--text);background:transparent}
  .section-title-input:hover{border-color:var(--line);background:#fff}
  .section-title-input:focus{border-color:#111827;background:#fff;box-shadow:0 0 0 3px rgba(17,24,39,.08)}
  .rows{display:grid;gap:10px}
  .row{display:grid;grid-template-columns:34px 1fr 118px 52px 44px;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);border-radius:16px;background:#fff}
  .index{width:26px;height:26px;border-radius:999px;background:#f3f4f6;display:grid;place-items:center;font-size:12px;font-weight:800;color:#4b5563}
  input[type="text"],input[type="number"],textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font:inherit;outline:none;background:#fff}
  input:focus,textarea:focus{border-color:#111827;box-shadow:0 0 0 3px rgba(17,24,39,.08)}
  input[type="color"]{width:42px;height:38px;border:1px solid var(--line);border-radius:12px;padding:4px;background:#fff;cursor:pointer}
  .json-box{display:none;margin-top:16px}.json-box.open{display:block}
  textarea{min-height:120px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px}
  @media(max-width:760px){.page{width:min(100vw - 24px,1180px);margin:24px auto}.hero,.editor-head{align-items:flex-start;flex-direction:column}.bar,.bar-wrap{min-height:94px}.bar{height:94px}.row{grid-template-columns:30px 1fr 88px 42px}.row input[type="color"]{display:none}}
</style>
</head>
<body>
<main class="page">
  <section class="hero">
    <div>
      <h1>动态比例长条</h1>
      <p>总长条固定为 100%，可新增项目、编辑子标题，并拖动分隔线调整比例。</p>
    </div>
    <div class="toolbar">
      <button class="primary" id="addTopBtn">＋ 新增项目</button>
      <button id="removeLastTopBtn">－ 删除最后一项</button>
      <button id="equalBtn">平均分配</button>
      <button id="toggleJsonBtn">JSON</button>
    </div>
  </section>

  <section class="stage">
    <div class="total-label">100%</div>
    <div class="bar-wrap" id="barWrap"><div class="bar" id="bar"></div></div>
    <div class="hint"><span>拖动黑色分隔线，可改变左右两段比例。</span><span id="sumText">合计：100%</span></div>

    <div class="editor">
      <div class="editor-head">
        <input id="sectionTitleInput" class="section-title-input" type="text" value="子长条项目" aria-label="区块标题">
        <div class="editor-actions">
          <button class="primary" id="addChildBtn">＋ 新增子长条</button>
          <button id="removeLastChildBtn">－ 删除最后一项</button>
        </div>
      </div>
      <div class="rows" id="rows"></div>
      <div class="json-box" id="jsonBox">
        <textarea id="jsonText" spellcheck="false"></textarea>
        <div class="footer-actions">
          <button id="copyJsonBtn">复制 JSON</button>
          <button id="applyJsonBtn">套用 JSON</button>
          <button class="danger" id="resetBtn">恢复范例</button>
        </div>
      </div>
    </div>
  </section>
</main>

<script>
(function(){
  const STORAGE_KEY = "dynamic_percent_bar_v3";
  const TITLE_KEY = "dynamic_percent_bar_section_title_v3";
  const minPct = 2;
  const palette = ["#FDE68A","#BFDBFE","#C7D2FE","#BBF7D0","#FBCFE8","#FED7AA","#DDD6FE","#A7F3D0","#FECACA","#BAE6FD"];
  const sample = [
    { title:"项目 A", pct:20, color:"#FDE68A" },
    { title:"项目 B", pct:20, color:"#BFDBFE" },
    { title:"项目 C", pct:60, color:"#C7D2FE" }
  ];
  let items = loadData() || structuredClone(sample);
  const bar = document.getElementById("bar");
  const barWrap = document.getElementById("barWrap");
  const rows = document.getElementById("rows");
  const sumText = document.getElementById("sumText");
  const jsonBox = document.getElementById("jsonBox");
  const jsonText = document.getElementById("jsonText");
  const sectionTitleInput = document.getElementById("sectionTitleInput");
  let drag = null;
  sectionTitleInput.value = localStorage.getItem(TITLE_KEY) || "子长条项目";
  sectionTitleInput.addEventListener("input", ()=>{ localStorage.setItem(TITLE_KEY, sectionTitleInput.value || "子长条项目"); });

  function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }
  function round1(n){ return Math.round(Number(n||0)*10)/10; }
  function fmt(n){ const v=round1(n); return Number.isInteger(v) ? String(v) : v.toFixed(1); }
  function esc(s){ return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }

  function normalize(){
    if(items.length === 0) items = [{title:"项目 1", pct:100, color:palette[0]}];
    if(items.length * minPct > 100){ alert("项目太多，无法保证每个项目至少 2%。"); items = items.slice(0, Math.floor(100/minPct)); }
    let sum = items.reduce((a,b)=>a + Number(b.pct||0), 0);
    if(!Number.isFinite(sum) || sum <= 0){ items.forEach(i=>i.pct = 100/items.length); }
    else { items.forEach(i=>i.pct = Math.max(minPct, Number(i.pct||0) / sum * 100)); }
    sum = items.reduce((a,b)=>a+b.pct,0);
    items.forEach(i=>i.pct = i.pct / sum * 100);
    items.forEach(i=>i.pct = round1(i.pct));
    const diff = round1(100 - items.reduce((a,b)=>a+b.pct,0));
    items[items.length-1].pct = round1(items[items.length-1].pct + diff);
  }

  function loadData(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return null;
      const arr = JSON.parse(raw);
      if(!Array.isArray(arr) || !arr.length) return null;
      return arr.map((it,i)=>({
        title:String(it.title || `项目 ${i+1}`),
        pct:Number(it.pct || 0),
        color:/^#[0-9A-Fa-f]{6}$/.test(it.color || "") ? it.color : palette[i % palette.length]
      }));
    }catch(e){ return null; }
  }
  function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }

  function render(){
    normalize();
    bar.innerHTML = "";
    rows.innerHTML = "";
    items.forEach((item,index)=>{
      const seg = document.createElement("div");
      seg.className = "segment";
      seg.style.flex = `0 0 ${item.pct}%`;
      seg.style.background = item.color;
      seg.innerHTML = `<div class="seg-title" title="${esc(item.title)}">${esc(item.title)}</div><div class="seg-pct">${fmt(item.pct)}%</div>`;
      if(index < items.length - 1){
        const h = document.createElement("div");
        h.className = "handle";
        h.dataset.index = index;
        h.addEventListener("pointerdown", startDrag);
        seg.appendChild(h);
      }
      bar.appendChild(seg);

      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `
        <div class="index">${index+1}</div>
        <input class="title" type="text" value="${esc(item.title)}" aria-label="子标题">
        <input class="pct" type="number" min="${minPct}" max="100" step="0.1" value="${fmt(item.pct)}" aria-label="百分比">
        <input class="color" type="color" value="${item.color}" aria-label="颜色">
        <button class="small danger delete" title="删除此项">×</button>`;
      rows.appendChild(row);
    });
    updateMeta();
    saveData();
  }

  function updateMeta(){
    const sum = items.reduce((a,b)=>a+b.pct,0);
    sumText.textContent = `合计：${fmt(sum)}%`;
    jsonText.value = JSON.stringify(items.map(i=>({title:i.title,pct:round1(i.pct),color:i.color})), null, 2);
  }

  rows.addEventListener("input", e=>{
    const row = e.target.closest(".row");
    if(!row) return;
    const index = [...rows.children].indexOf(row);
    if(e.target.classList.contains("title")){ items[index].title = e.target.value || `项目 ${index+1}`; renderBarOnly(); }
    if(e.target.classList.contains("color")){ items[index].color = e.target.value; renderBarOnly(); }
  });
  rows.addEventListener("change", e=>{
    const row = e.target.closest(".row");
    if(!row) return;
    const index = [...rows.children].indexOf(row);
    if(e.target.classList.contains("pct")) setPct(index, Number(e.target.value));
  });
  rows.addEventListener("click", e=>{
    if(!e.target.classList.contains("delete")) return;
    const index = [...rows.children].indexOf(e.target.closest(".row"));
    deleteItem(index);
  });

  function renderBarOnly(){ render(); }

  function addItem(){
    if(items.length >= Math.floor(100/minPct)){ alert("项目数量已达上限。每个项目至少保留 2%。"); return; }
    const addPct = items.length ? 10 : 100;
    const scale = items.length ? (100 - addPct) / 100 : 0;
    items.forEach(i=>i.pct = i.pct * scale);
    items.push({ title:`项目 ${items.length+1}`, pct:addPct, color:palette[items.length % palette.length] });
    render();
  }
  function deleteItem(index){
    if(items.length <= 1){ alert("至少要保留 1 个项目。"); return; }
    items.splice(index,1);
    render();
  }
  function removeLast(){ deleteItem(items.length - 1); }
  function equalize(){ items.forEach(i=>i.pct = 100/items.length); render(); }

  function setPct(index, value){
    if(items.length === 1){ items[0].pct = 100; render(); return; }
    const next = clamp(Number(value||minPct), minPct, 100 - minPct*(items.length-1));
    const old = items[index].pct;
    const delta = next - old;
    const otherIndexes = items.map((_,i)=>i).filter(i=>i!==index);
    const otherSum = otherIndexes.reduce((a,i)=>a+items[i].pct,0);
    items[index].pct = next;
    otherIndexes.forEach(i=>{
      const share = otherSum ? items[i].pct / otherSum : 1/otherIndexes.length;
      items[i].pct = Math.max(minPct, items[i].pct - delta * share);
    });
    render();
  }

  function startDrag(e){
    const index = Number(e.currentTarget.dataset.index);
    drag = { index, startX:e.clientX, width:barWrap.getBoundingClientRect().width, left:items[index].pct, right:items[index+1].pct, handle:e.currentTarget };
    e.currentTarget.classList.add("active");
    e.currentTarget.setPointerCapture(e.pointerId);
    window.addEventListener("pointermove", onDrag);
    window.addEventListener("pointerup", endDrag, {once:true});
  }
  function onDrag(e){
    if(!drag) return;
    const dx = (e.clientX - drag.startX) / drag.width * 100;
    const total = drag.left + drag.right;
    const left = clamp(drag.left + dx, minPct, total - minPct);
    items[drag.index].pct = round1(left);
    items[drag.index+1].pct = round1(total - left);
    const segs = [...bar.querySelectorAll(".segment")];
    segs.forEach((seg,i)=>{
      seg.style.flex = `0 0 ${items[i].pct}%`;
      seg.querySelector(".seg-pct").textContent = `${fmt(items[i].pct)}%`;
    });
    updateMeta();
  }
  function endDrag(){
    if(drag && drag.handle) drag.handle.classList.remove("active");
    window.removeEventListener("pointermove", onDrag);
    normalize(); drag = null; render();
  }

  document.getElementById("addTopBtn").onclick = addItem;
  document.getElementById("addChildBtn").onclick = addItem;
  document.getElementById("removeLastTopBtn").onclick = removeLast;
  document.getElementById("removeLastChildBtn").onclick = removeLast;
  document.getElementById("equalBtn").onclick = equalize;
  document.getElementById("toggleJsonBtn").onclick = ()=>{ jsonBox.classList.toggle("open"); updateMeta(); };
  document.getElementById("copyJsonBtn").onclick = async()=>{
    updateMeta();
    try{ await navigator.clipboard.writeText(jsonText.value); alert("JSON 已复制"); }
    catch(e){ jsonText.select(); document.execCommand("copy"); alert("JSON 已复制"); }
  };
  document.getElementById("applyJsonBtn").onclick = ()=>{
    try{
      const arr = JSON.parse(jsonText.value);
      if(!Array.isArray(arr) || !arr.length) throw new Error("JSON 必须是非空数组");
      items = arr.map((it,i)=>({ title:String(it.title || `项目 ${i+1}`), pct:Number(it.pct||0), color:/^#[0-9A-Fa-f]{6}$/.test(it.color||"") ? it.color : palette[i%palette.length] }));
      render();
    }catch(e){ alert("JSON 格式不正确：" + e.message); }
  };
  document.getElementById("resetBtn").onclick = ()=>{ localStorage.removeItem(STORAGE_KEY); items = structuredClone(sample); render(); };

  render();
})();
</script>
</body>
</html>
